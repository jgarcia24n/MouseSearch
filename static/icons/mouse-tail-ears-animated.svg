<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
       viewBox="0 0 300 340"
       version="1.1"
       xmlns="http://www.w3.org/2000/svg"
       xmlns:svg="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient
           id="headGradTail"
           x1="0%"
           y1="0%"
           x2="0%"
           y2="100%">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#b095e6" />
        </linearGradient>
        <linearGradient
           id="earGradTail"
           x1="0%"
           y1="0%"
           x2="0%"
           y2="100%">
          <stop offset="0%" stop-color="#a16ff2" />
          <stop offset="100%" stop-color="#763cd4" />
        </linearGradient>
        <radialGradient
           id="lensGradTail"
           cx="35%"
           cy="35%"
           r="65%">
          <stop offset="0%" stop-color="#d6b8ff" />
          <stop offset="50%" stop-color="#9f5ff0" />
          <stop offset="100%" stop-color="#6930c3" />
        </radialGradient>
      </defs>
      <g>
        <!-- Tail -->
        <path
           fill="none"
           stroke="#100324"
           stroke-width="14"
           stroke-linecap="round">
          <animate
             attributeName="d"
             values="M 90 200 C 20 280, 100 300, 160 275 C 200 260, 230 290, 220 320;M 90 200 C 10 270, 80 310, 140 285 C 190 265, 210 280, 230 310;M 90 200 C 20 280, 100 300, 160 275 C 200 260, 230 290, 220 320"
             dur="1.5s"
             repeatCount="indefinite" />
        </path>
        
        <!-- Left Ear -->
        <circle
           cx="85"
           cy="80"
           r="48"
           fill="url(#earGradTail)"
           stroke="#100324"
           stroke-width="12">
          <animateTransform 
             attributeName="transform" 
             type="rotate" 
             values="0 120 120; -6 120 120; 0 120 120" 
             dur="1.6s" 
             repeatCount="indefinite" />
        </circle>
        
        <!-- Right Ear -->
        <circle
           cx="215"
           cy="80"
           r="48"
           fill="url(#earGradTail)"
           stroke="#100324"
           stroke-width="12">
          <animateTransform 
             attributeName="transform" 
             type="rotate" 
             values="0 180 120; 6 180 120; 0 180 120" 
             dur="1.6s" 
             repeatCount="indefinite" />
        </circle>
        
        <!-- Head -->
        <ellipse
           cx="150"
           cy="150"
           rx="85"
           ry="90.34948"
           fill="url(#headGradTail)"
           stroke="#100324"
           stroke-width="12" />
           
        <!-- Left Eye -->
        <circle
           cx="117"
           cy="111"
           r="11"
           fill="#100324" />
           
        <!-- Right Eye -->
        <circle
           cx="183"
           cy="111"
           r="11"
           fill="#100324" />
           
        <!-- Whiskers / Nose elements -->
        <path
           d="M 91.197315,148.72121 H 124.22088"
           stroke="#100324"
           stroke-width="12.7207"
           stroke-linecap="round" />
        <path
           d="m 90.013639,176.21869 30.205051,-5.43738"
           stroke="#100324"
           stroke-width="13.5626"
           stroke-linecap="round" />
           
        <!-- Magnifying Glass -->
        <g transform="translate(0,2)">
          <line
             x1="225"
             y1="225"
             x2="270"
             y2="280"
             stroke="#100324"
             stroke-width="28"
             stroke-linecap="round" />
          <line
             x1="225"
             y1="225"
             x2="270"
             y2="280"
             stroke="#48188a"
             stroke-width="12"
             stroke-linecap="round" />
          <circle
             cx="190"
             cy="190"
             r="60"
             fill="#ebe8f2"
             stroke="#100324"
             stroke-width="12" />
          <circle
             cx="190"
             cy="190"
             r="46"
             fill="url(#lensGradTail)"
             stroke="#100324"
             stroke-width="8" />
          <path
             d="m 162,173 a 30,30 0 0 1 35,-15"
             fill="none"
             stroke="#ffffff"
             stroke-width="8"
             stroke-linecap="round" />
          <circle
             cx="158"
             cy="188"
             r="6"
             fill="#ffffff" />
        </g>
      </g>
    </svg>