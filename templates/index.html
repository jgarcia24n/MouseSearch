    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="settingsOffcanvasLabel">Settings</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>

        <form id="settings-form">
            <h5 class="text-center border-bottom pb-2 mb-0">qBittorrent</h5>
            <div class="mb-3">
                <label for="QB_URL" class="form-label">qBittorrent URL</label>
                <input
                    type="text"
                    class="form-control"
                    id="QB_URL"
                    name="QB_URL"
                    value="{{ QB_URL }}"
                    required
                />
            </div>
            <div class="mb-3">
                <label for="QB_USERNAME" class="form-label">Username</label>
                <input
                    type="text"
                    class="form-control"
                    id="QB_USERNAME"
                    name="QB_USERNAME"
                    value="{{ QB_USERNAME }}"
                    required
                />
            </div>
            <div class="mb-3">
                <label for="QB_PASSWORD" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="QB_PASSWORD"
                    name="QB_PASSWORD"
                    value="{{ QB_PASSWORD }}"
                    required
                />
            </div>
    
            <h5 class="text-center border-bottom pb-2">MyAnonamouse</h5>
            <div class="mb-3">
                <label for="MAM_ID" class="form-label">MAM ID</label>
                <input
                    type="text"
                    class="form-control"
                    id="MAM_ID"
                    name="MAM_ID"
                    value="{{ MAM_ID }}"
                    required
                />
            </div>
    
            <button type="button" class="btn btn-primary" id="save-settings-button">Save Settings</button>
        </form>
        <div id="response-message" class="mt-3"></div>
    </div>
</div>

<script>
    document.getElementById('save-settings-button').addEventListener('click', function () {
        const form = document.getElementById('settings-form');
        const formData = new FormData(form);

        fetch('/update_settings', {
            method: 'POST',
            body: formData,
        })
        .then(response => response.json())
        .then(data => {
            const messageDiv = document.getElementById('response-message');
            if (data.status === 'success') {
                messageDiv.innerHTML = '<div class="alert alert-success">' + data.message + '</div>';
            } else {
                messageDiv.innerHTML = '<div class="alert alert-danger">Failed to save settings. Please try again.</div>';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            const messageDiv = document.getElementById('response-message');
            messageDiv.innerHTML = '<div class="alert alert-danger">An error occurred while saving settings.</div>';
        });
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const searchForm = document.getElementById("search-form");
        const resultsContainer = document.getElementById("results-container");
        //const spinner = document.getElementById("spinner"); // Ensure spinner is retrieved
        const searchButton = document.getElementById("searchButton");

        searchForm.addEventListener("submit", function(e) {
            e.preventDefault(); // Prevent the default form submission

            // Show the spinner by removing the 'd-none' class
        //spinner.classList.remove("d-none");

        // modify search button
        searchButton.disabled = true; // Disable the button to prevent multiple clicks
        searchButton.innerHTML = `
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Searching...
        `;

            // Collect form data
            const formData = new FormData(searchForm);
            const queryParams = new URLSearchParams(formData).toString();
            console.log(formData)
            console.log(queryParams)
            // Send AJAX request
            fetch("/?"+queryParams, {
                method: "GET",
                headers: {
                    "X-Requested-With": "XMLHttpRequest" // Optional for identifying AJAX requests
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }
                return response.text(); // Get response HTML
            })
            .then(html => {
                // Update the results container
                resultsContainer.innerHTML = html;
            })
            .catch(error => {
                console.error("Error during AJAX request:", error);
            })
            .finally(() => {
                // Hide the spinner
                //spinner.classList.add("d-none");

                // Reset the search button appearance and text
                searchButton.disabled = false;
                searchButton.innerHTML = "Search";
        });
        });

        
    
        
    });
</script>
