<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <script src="{{ url_for('static', filename='bootstrap/js/color-modes.js') }}"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MouseSearch – Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon/transparent.png') }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow" style="width: 100%; max-width: 360px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='favicon/transparent.png') }}" width="56" alt="MouseSearch">
        <h5 class="mt-3 mb-0 fw-semibold">MouseSearch</h5>
        <p class="text-muted small mb-0">Sign in to continue</p>
      </div>
      {% if error %}
      <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" id="username" name="username" type="text"
                 autocomplete="username" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" id="password" name="password" type="password"
                 autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
