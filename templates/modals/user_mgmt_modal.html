<div class="modal fade" id="userMgmtModal" tabindex="-1" aria-labelledby="userMgmtModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-body">

      <div class="modal-header border-0 position-absolute w-100 p-4" style="z-index: 1050; background: transparent;">
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal" aria-label="Close"
          style="filter: invert(1); opacity: 0.8;"></button>
      </div>

      <div class="modal-body p-0 overflow-y-auto custom-scrollbar">

        <!-- List view -->
        <div id="userMgmt-list-view" class="container py-5 pt-md-4 pb-md-5" style="max-width: 860px;">
          <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
            <div>
              <h4 class="mb-0 fw-bold"><i class="bi bi-people-fill me-2 text-primary"></i>User Management</h4>
              <p class="text-body-secondary small mb-0">Manage accounts and their permissions</p>
            </div>
            <button class="btn btn-primary" onclick="userMgmtShowForm(null)">
              <i class="bi bi-person-plus me-1"></i>New User
            </button>
          </div>
          <div id="userMgmt-list-content">
            <div class="text-center py-5">
              <div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Loading...</span></div>
            </div>
          </div>
        </div>

        <!-- Form view -->
        <div id="userMgmt-form-view" class="container py-5 pt-md-4 pb-md-5 d-none" style="max-width: 520px;">
          <div class="d-flex align-items-center gap-3 mb-4 mt-3">
            <button class="btn btn-link text-body-secondary text-decoration-none p-0 d-flex align-items-center gap-1"
                    onclick="userMgmtShowList()">
              <i class="bi bi-arrow-left"></i> Back
            </button>
            <div>
              <h4 class="mb-0 fw-bold" id="userMgmt-form-title"></h4>
              <p class="text-body-secondary small mb-0" id="userMgmt-form-subtitle"></p>
            </div>
          </div>

          <div id="userMgmt-form-error" class="alert alert-danger py-2 small d-none"></div>

          <form id="userMgmt-form" class="card shadow-sm" onsubmit="return false;">
            <div class="card-body p-4" id="userMgmt-form-body">
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
