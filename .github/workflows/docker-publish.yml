name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v1.2.3)"
        required: false
        default: ""
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/amd64,linux/arm64"
      push_latest:
        description: "Also push :latest?"
        required: false
        type: boolean
        default: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          # If run manually and a tag is provided, use it; otherwise derive from SHA
          TAG_INPUT="${{ github.event.inputs.tag }}"
          if [ -n "$TAG_INPUT" ]; then
            echo "VERSION=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mousesearch:${{ steps.tags.outputs.VERSION }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}/mousesearch:latest', secrets.DOCKERHUB_USERNAME) || '' }}